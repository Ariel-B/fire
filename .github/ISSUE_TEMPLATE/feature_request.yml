name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need or limitation are you trying to address?
      placeholder: Describe the gap in the current experience.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or workflow you want.
      placeholder: Describe the proposed feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative approaches.
  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Small quality-of-life improvement
        - Useful feature for some users
        - High-value feature for many users
        - Breaking or architectural change
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Mockups, examples, links, or implementation notes.