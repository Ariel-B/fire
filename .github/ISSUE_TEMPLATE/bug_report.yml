name: Bug report
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.

        For security issues, do not open a public issue. Please follow the instructions in [docs/security/SECURITY.md](../../docs/security/SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is happening, and what did you expect instead?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest reproducible set of steps.
      placeholder: |
        1. Go to ...
        2. Enter ...
        3. Click ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Backend API
        - Frontend UI
        - Portfolio calculations
        - RSU calculations
        - Currency conversion
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, runtime, or deployment details that matter.
      placeholder: macOS 15, Chrome 134, .NET 9.0, Docker Desktop 4.x
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error output or screenshots if available.
      render: shell