name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate-and-release:
    name: Validate and Publish Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Restore solution
      run: dotnet restore fire.sln

    - name: Build solution
      run: dotnet build fire.sln --no-restore --configuration Release

    - name: Run full test suite
      run: make test

    - name: Pack release bundle
      run: |
        dotnet publish FirePlanningTool.csproj --configuration Release --output ./artifacts/publish
        tar -czf fire-${GITHUB_REF_NAME}.tar.gz -C ./artifacts publish

    - name: Create GitHub release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
      with:
        generate_release_notes: true
        files: fire-${{ github.ref_name }}.tar.gz